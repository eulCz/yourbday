<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Happy Birthday</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <div class="stars"></div>

  <audio id="music" loop>
    <source src="music.mp3" type="audio/mpeg" />
  </audio>

  <main class="container">
    <div class="note-card">
      <img src="handwriting.png" alt="Handwritten birthday note" class="note" />
    </div>

    <p class="instruction" id="instruction">Click the candle to blow it out</p>

    <div class="cake-scene">
      <div class="cake" id="cake">
        <div class="plate"></div>

        <div class="layer layer-bottom"></div>
        <div class="layer layer-middle"></div>
        <div class="layer layer-top"></div>

        <div class="icing icing-1"></div>
        <div class="icing icing-2"></div>
        <div class="icing icing-3"></div>

        <div class="candle" id="candle">
          <div class="flame" id="flame"></div>
          <div class="smoke hidden" id="smoke">
            <span></span>
            <span></span>
            <span></span>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script src="script.js"></script>
</body>

</html>
